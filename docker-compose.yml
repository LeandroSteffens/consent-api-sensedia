version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: consent-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  api:
    build: .
    container_name: consent-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/consent_db
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo-data: